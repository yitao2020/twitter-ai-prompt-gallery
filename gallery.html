.btn:hover { border-color:var(--accent) }
.btn.active { background:var(--accent); border-color:var(--accent); color:#fff }
.btn.nbp { border-color:var(--nbp-color); color:var(--nbp-color) }

.count-badge { font-size:.78em; color:var(--text-dim); margin-left:4px }

.tag-btn.active { background:var(--accent); border-color:var(--accent); color:#fff }
.tag-btn .tag-count { opacity:.6; font-size:.82em; margin-left:2px }

/* Waterfall */
.gallery {

}

@media(max-width:1000px){ .gallery { column-count:3 } }
@media(max-width:700px){ .gallery { column-count:2 } }

/* Card */
.card {

.card .img-wrap img { width:100%; height:auto; display:block }

sm: The left half of the object should appear exactly as it looks in real life — accurate materials, colors, textures, reflections, and proportions. This half must be completely opaque with no transparency and no wireframe overlay. No soft transition, no fading, no blending.\n\nRight Half — Hard Cut Wireframe Interior: The right half must switch cleanly to a wireframe interior diagram. The boundary between the two halves must be a perfectly vertical, perfectly sharp, crisp cut line. No diagonal edges, no curved slicing, no gradient. The wireframe must use only two line colors: Primary: white (≈80% of all lines), Secondary: a color sampled from the dominant color of the realistic half (<20% of lines). Every wireframe component must perfectly match the geometry of the object.\n\nStrict Single-Object Rule: Render only ONE object in the entire frame. No duplicate objects, no mirrored pairings, no reflections showing a second object. Apply a natural, subtle tilt + rotation in 3D. Use soft, neutral global illumination and no shadows under the object.", "thumbnail": "tweet-images/nano-banana/michalmalewicz_split_view_wireframe_1.jpg", "images": ["tweet-images/nano-banana/michalmalewicz_split_view_wireframe_1.jpg", "tweet-images/nano-banana/michalmalewicz_split_view_wireframe_2.jpg", "tweet-images/nano-banana/michalmalewicz_split_view_wireframe_3.jpg", "tweet-images/nano-banana/michalmalewicz_split_view_wireframe_4.jpg"], "tags": ["product", "architecture", "lifestyle", "selfie"]}, {"num": "1.35", "tool": "nano-banana", "tool_label": "Nano Banana Pro", "title": "3D Isometric Home Office", "author": "dotey", "tweet_url": "https://x.com/dotey/status/1995944319677554985", "tweet_id": "1995944319677554985", "prompt": "Based on you know about me, generate a 3D isometric colored illustration of me working from home, filled with various interior details. The visual style should be rounded, polished, and playful. --ar 1:1 [Additional details: a bichon frise and 3 monitors]", "thumb let currentFilter = 'all';
let currentSearch = '';
let currentTag = '';
let lbIdx = -1;

function filter() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  render();
}

function setFilter(f, btn) {
  currentFilter = f;
  currentTag = '';
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tagAll').classList.add('active');
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  render();
}

function setTag(tag, btn) {
  currentTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

function getFiltered() {
  let items = ALL;
  if (currentFilter !== 'all') {
    items = items.filter(e => e.tool === currentFilter);
  }
  if (currentTag) {
    items = items.filter(e => e.tags && e.tags.includes(currentTag));
  }
  if (currentSearch) {
    const q = currentSearch;
    items = items.filter(e => 
      e.title.toLowerCase().includes(q) ||
      e.author.toLowerCase().includes(q) ||
      (e.prompt && e.prompt.toLowerCase().includes(q))
    );
  }
  return items;
}

function render() {
  const items = getFiltered();
  const gallery = document.getElementById('gallery');
  const empty = document.getElementById('emptyMsg');
  if (items.length === 0) { gallery.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  gallery.innerHTML = items.map((e, i) => {
    const imgCount = e.images.length > 1 ? '<span class="img-count">' + e.images.length + '张</span>' : '';
    const promptPreview = e.prompt ? e.prompt.substring(0, 60).replace(/\n/g,' ') + '...' : '';
    const globalIdx = ALL.indexOf(e);
    return '<div class="card" onclick="openLB(' + globalIdx + ')" data-idx="' + globalIdx + '"><div class="img-wrap"><img src="' + e.thumbnail + '" alt="' + e.title.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=no-img>加载失败</div>\'">' + imgCount + '</div><div class="meta"><div class="card-title" title="' + e.title.replace(/"/g,'&quot;') + '">' + e.title + '</div><div class="card-author">@' + e.author + '</div><div class="card-num">#' + e.num + '</div>' + (promptPreview ? '<div class="prompt-preview">' + promptPreview + '</div>' : '') + '</div></div>';
  }).join('');
}

function openLB(globalIdx) {
  lbIdx = globalIdx;
  showLBItem();
  document.getElementById('lbOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lbOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function navLB(dir) {
  lbIdx += dir;
  if (lbIdx < 0) lbIdx = ALL.length - 1;
  if (lbIdx >= ALL.length) lbIdx = 0;
  showLBItem();
}

function showLBItem() {
  const e = ALL[lbIdx];
  if (!e) return;
  const promptHTML = e.prompt 
    ? '<div class="lb-prompt">' + e.prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'
    : '<div class="lb-prompt" style="color:var(--text-dim);font-style:italic">（提示词未收录）</div>';
  const thumbsHTML = e.images.length > 1
    ? '<div class="lb-images">' + e.images.map((img, i) => 
        '<img src="' + img + '" onclick="document.querySelector(\'.lb-img-panel img\').src=\'' + img + '\';document.querySelector(\'.img-counter\').textContent=\'' + (i+1) + '/' + e.images.length + '\'" title="点击切换大图">'
      ).join('') + '</div>'
    : '';
  const navHTML = e.images.length > 1
    ? '<button class="nav-btn prev" onclick="event.stopPropagation();navImg(-1)">&lsaquo;</button><button class="nav-btn next" onclick="event.stopPropagation();navImg(1)">&rsaquo;</button><span class="img-counter">1/' + e.images.length + '</span>'
    : '';
  document.getElementById('lbContent').innerHTML = '<div class="lb-img-panel"><img src="' + e.thumbnail + '" alt="' + e.title + '">' + navHTML + '</div><div class="lb-info"><h2>' + e.title.replace(/</g,'&lt;') + '</h2><div class="lb-author">@' + e.author + '</div><div class="lb-num">#' + e.num + ' · ' + e.tool_label + ' · ' + e.images.length + ' 张配图</div><div class="lb-links"><a href="' + e.tweet_url + '" target="_blank" rel="noopener">原帖</a>' + (lbIdx > 0 ? '<a href="javascript:void(0)" onclick="openLB(' + (lbIdx-1) + ')">上一条</a>' : '') + (lbIdx < ALL.length-1 ? '<a href="javascript:void(0)" onclick="openLB(' + (lbIdx+1) + ')">下一条</a>' : '') + '</div>' + promptHTML + thumbsHTML;
  window._lbImages = e.images;
  window._lbCurrentImg = 0;
}

function navImg(dir) {
  if (!window._lbImages || window._lbImages.length <= 1) return;
  window._lbCurrentImg = (window._lbCurrentImg + dir + window._lbImages.length) % window._lbImages.length;
  const img = document.querySelector('.lb-img-panel img');
  const counter = document.querySelector('.img-counter');
  if (img) img.src = window._lbImages[window._lbCurrentImg];
  if (counter) counter.textContent = (window._lbCurrentImg+1) + '/' + window._lbImages.length;
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lbOverlay');
  if (!lb.classList.contains('show')) return;
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowLeft') navLB(-1);
  if (e.key === 'ArrowRight') navLB(1);
});

// Back to top visibility
window.addEventListener('scroll', function() {
  var btn = document.getElementById('backToTop');
  if (window.scrollY > 400) btn.classList.add('show');
  else btn.classList.remove('show');
});

render();
</script>
</body>
</html>
